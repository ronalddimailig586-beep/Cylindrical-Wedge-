<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cylindrical Wedge Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>📐Cylindrical Wedge Calculator</h2>
    <p>Calculate the volume of a cylindrical wedge using the formula - 2/3 * r² * h.</p>
    
    <div class="input-group">
        <label for="radius">Radius (r) cm</label>
        <input type="number" id="radius" placeholder="e.g. 5.5" step="any">
    </div>
    
    <div class="input-group">
        <label for="height">Height (h) cm</label>
        <input type="number" id="height" placeholder="e.g. 10" step="any">
    </div>
    
    <button onclick="calculate()">Calculate Volume</button>

    <div id="result">
        <div class="volume-label">TOTAL VOLUME</div>
        <div class="volume-text"><span id="volumeValue">0</span> cm³</div>
    </div>
</div>

<script>
    function calculate() {
        const r = parseFloat(document.getElementById('radius').value);
        const h = parseFloat(document.getElementById('height').value);
        
        if (isNaN(r) || isNaN(h) || r <= 0 || h <= 0) {
            alert("❌ Please enter positive numbers for both fields.");
            return;
        }

        // Logic: (2/3) * r^2 * h
        const volume = (2.0 / 3.0) * Math.pow(r, 2) * h;
        
        document.getElementById('volumeValue').innerText = volume.toLocaleString(undefined, {
            minimumFractionDigits: 4,
            maximumFractionDigits: 4
        });
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
